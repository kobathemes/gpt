<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    :root {
      --bg: #F4F1EA;
      --text: #1F1B16;
      --accent: #C96442;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Iowan Old Style', 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .wrap {
      max-width: 600px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .accent {
      color: var(--accent);
    }

    p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #5A5550;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Coming <span class="accent">Soon</span></h1>
    <p>We're putting the finishing touches on something good.</p>
  </div>
</body>
</html>
